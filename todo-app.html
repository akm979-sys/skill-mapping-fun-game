<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        .completed { text-decoration: line-through; color: grey; }
    </style>
</head>
<body>
    <h1>To-Do List</h1>
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button id="addTaskBtn">Add Task</button>
    <ul id="taskList"></ul>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const taskList = document.getElementById('taskList');

        // Load tasks from local storage
        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        tasks.forEach(task => addTaskToList(task.text, task.completed));

        // Add task
        addTaskBtn.addEventListener('click', () => {
            const taskText = taskInput.value;
            if (taskText) {
                addTaskToList(taskText, false);
                tasks.push({ text: taskText, completed: false });
                localStorage.setItem('tasks', JSON.stringify(tasks));
                taskInput.value = '';
            }
        });

        // Function to add task to the UI
        function addTaskToList(taskText, completed) {
            const li = document.createElement('li');
            li.textContent = taskText;
            if (completed) li.classList.add('completed');

            // Mark as complete
            li.addEventListener('click', () => {
                li.classList.toggle('completed');
                const index = tasks.findIndex(task => task.text === taskText);
                tasks[index].completed = !tasks[index].completed;
                localStorage.setItem('tasks', JSON.stringify(tasks));
            });

            // Delete task
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                li.remove();
                const index = tasks.findIndex(task => task.text === taskText);
                tasks.splice(index, 1);
                localStorage.setItem('tasks', JSON.stringify(tasks));
            });
            li.appendChild(deleteBtn);
            taskList.appendChild(li);
        }
    </script>
</body>
</html>
